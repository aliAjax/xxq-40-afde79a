<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收文登记管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="title-icon">📄</span>
                    收文登记管理系统
                </h1>
                <p class="subtitle">政府单位内部公文收文登记平台</p>
            </div>
        </header>

        <div class="stats-section">
            <div class="stat-card pending">
                <div class="stat-icon">⏳</div>
                <div class="stat-info">
                    <div class="stat-number" id="pendingCount">0</div>
                    <div class="stat-label">待办理</div>
                </div>
            </div>
            <div class="stat-card urgent">
                <div class="stat-icon">⚠️</div>
                <div class="stat-info">
                    <div class="stat-number" id="urgentCount">0</div>
                    <div class="stat-label">即将到期</div>
                </div>
            </div>
            <div class="stat-card done">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <div class="stat-number" id="doneCount">0</div>
                    <div class="stat-label">已办结</div>
                </div>
            </div>
            <div class="stat-card total">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">收文总数</div>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索标题、来文单位、承办科室..." class="search-input">
                <button class="search-btn" onclick="searchDocuments()">🔍</button>
            </div>
            <div class="toolbar-actions">
                <button class="btn btn-primary" onclick="openAddModal()">
                    <span class="btn-icon">➕</span> 新增收文
                </button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="pending" onclick="switchTab('pending')">
                待办理 <span class="tab-badge" id="tabPendingBadge">0</span>
            </div>
            <div class="tab" data-tab="urgent" onclick="switchTab('urgent')">
                即将到期 <span class="tab-badge urgent" id="tabUrgentBadge">0</span>
            </div>
            <div class="tab" data-tab="done" onclick="switchTab('done')">
                已办结 <span class="tab-badge done" id="tabDoneBadge">0</span>
            </div>
            <div class="tab" data-tab="all" onclick="switchTab('all')">
                全部
            </div>
        </div>

        <div class="content">
            <div class="document-list" id="documentList">
                <div class="empty-state">
                    <div class="empty-icon">📂</div>
                    <p class="empty-text">暂无收文记录</p>
                    <button class="btn btn-primary" onclick="openAddModal()">新增第一条收文</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="documentModal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新增收文</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <form id="documentForm" class="modal-body">
                <input type="hidden" id="documentId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="fromUnit">来文单位 <span class="required">*</span></label>
                        <input type="text" id="fromUnit" class="form-input" placeholder="请来文单位" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="docNumber">文号 <span class="required">*</span></label>
                        <input type="text" id="docNumber" class="form-input" placeholder="请输入文号" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="title">标题 <span class="required">*</span></label>
                    <input type="text" id="title" class="form-input" placeholder="请输入文件标题" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="receiveDate">收文日期 <span class="required">*</span></label>
                        <input type="date" id="receiveDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="urgency">紧急程度 <span class="required">*</span></label>
                        <select id="urgency" class="form-input" required>
                            <option value="普通">普通</option>
                            <option value="加急">加急</option>
                            <option value="特急">特急</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="department">承办科室 <span class="required">*</span></label>
                        <select id="department" class="form-input" required>
                            <option value="">请选择承办科室</option>
                            <option value="办公室">办公室</option>
                            <option value="综合科">综合科</option>
                            <option value="业务一科">业务一科</option>
                            <option value="业务二科">业务二科</option>
                            <option value="法制科">法制科</option>
                            <option value="财务科">财务科</option>
                            <option value="人事科">人事科</option>
                            <option value="信息科">信息科</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="deadline">办理期限 <span class="required">*</span></label>
                        <input type="date" id="deadline" class="form-input" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="remark">备注</label>
                    <textarea id="remark" class="form-input form-textarea" placeholder="请输入备注信息（选填）" rows="3"></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-default" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-overlay" onclick="closeDetailModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>收文详情</h2>
                <button class="modal-close" onclick="closeDetailModal()">✕</button>
            </div>
            <div class="modal-body" id="detailContent">
            </div>
            <div class="modal-footer" id="detailActions">
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
